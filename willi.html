<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Willy</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; transition: 2s; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #clock { font-size: 8rem; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
    </div>
    <script>
        // Tvoje presné ID tabuľky
        const id = '1vTC382du3NGc6b_DugnxS1y3-p-Yt1iBJ63cmkTIEIp8';
        
        async function run() {
            // CSV export - najspoľahlivejší spôsob
            const r = await fetch(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv`);
            const txt = await r.text();
            const rows = txt.split('\n');
            const ids = rows.map(r => r.split(',')[3]).filter(i => i && i.length > 10);
            
            if (ids.length > 0) {
                const imgId = ids[Math.floor(Math.random() * ids.length)].replace(/"/g, '').trim();
                document.getElementById('bg').style.backgroundImage = `url('https://drive.google.com/thumbnail?sz=w1920&id=${imgId}')`;
            }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(run, 30000);
        run();
    </script>
</body>
</html>
