<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Willy Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; transition: 2s; filter: brightness(0.6); }
        #clock { font-size: 10rem; text-align: center; margin-top: 25vh; font-weight: 100; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="clock">00:00</div>

    <script>
        // TOTO JE TVOJE NOVÉ ID Z ODKAZU
        const spreadsheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';

        async function update() {
            try {
                // Pokus č. 1: Načtení přes CSV (nejspolehlivější pro publikované tabulky)
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=230699175`);
                const data = await response.text();
                
                const rows = data.split('\n');
                // Hledáme ID v 4. sloupci (index 3). Pokud jsi ho posunul, upravíme index.
                const images = rows.map(r => {
                    const cols = r.split(',');
                    return cols[3] ? cols[3].replace(/"/g, '').trim() : null;
                }).filter(id => id && id.length > 20);

                if (images.length > 0) {
                    const randomId = images[Math.floor(Math.random() * images.length)];
                    const url = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                    const bg = document.getElementById('bg');
                    const img = new Image();
                    img.src = url;
                    img.onload = () => { bg.style.backgroundImage = `url('${url}')`; };
                }
            } catch (e) {
                console.log("Chyba načítání, zkusím jinou cestu...");
            }
            
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
        }

        setInterval(update, 60000);
        update();
    </script>
</body>
</html>
