<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center center; transition: 1.5s; filter: brightness(0.4); background-color: #111; }
        
        /* BOČNÉ MENU */
        #side-nav { position: fixed; left: 0; top: 0; height: 100vh; width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; background: transparent; z-index: 100; }
        .nav-item { cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; border-radius: 20px; }
        .nav-item i { font-size: 3.5rem; }
        .icon-home { color: #4285F4; }
        .icon-media { color: #EA4335; }
        .icon-light { color: #FBBC05; }
        .icon-flora { color: #34A853; }
        .nav-item.active { background: rgba(255,255,255,0.1); }

        /* HODINY A OBSAH */
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-left: 100px; transition: 0.5s; }
        #clock { font-size: 13rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }
        #date { font-size: 2.5rem; opacity: 0.9; margin-top: 20px; font-weight: 300; }

        /* MULTIMEDIÁLNY PANEL */
        #media-overlay { display: none; position: fixed; top: 0; left: 100px; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        .media-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin: 20px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; cursor: pointer; }
        .media-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.2); }
        .media-card h2 { margin-top: 0; color: #EA4335; }

        /* POČASIE */
        #weather-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #weather-icon { width: 70px; height: 70px; }
        #weather-temp { font-size: 2.5rem; font-weight: bold; }

        .btn-nav { position: absolute; top: 50%; transform: translateY(-50%); padding: 50px 15px; background: rgba(255,255,255,0.02); color: white; border: none; font-size: 2.5rem; cursor: pointer; z-index: 10; opacity: 0.3; }
        #btn-prev { left: 110px; }
        #btn-next { right: 10px; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <nav id="side-nav">
        <div class="nav-item active" onclick="showSection('home')"><i class="material-icons icon-home">home</i></div>
        <div class="nav-item" onclick="showSection('media')"><i class="material-icons icon-media">music_note</i></div>
        <div class="nav-item"><i class="material-icons icon-light">lightbulb</i></div>
        <div class="nav-item"><i class="material-icons icon-flora">local_florist</i></div>
    </nav>

    <div id="media-overlay">
        <h1 style="font-size: 3rem; margin-bottom: 40px;">Multimédiá</h1>
        <div class="media-card" onclick="window.open('https://www.kiss.cz/', '_blank')">
            <h2>Rádio KISS</h2>
            <p>Klikni pre spustenie streamu</p>
        </div>
        <div class="media-card" onclick="window.open('https://open.spotify.com/', '_blank')">
            <h2 style="color: #1DB954;">Spotify</h2>
            <p>Webový prehrávač / Aplikácia</p>
        </div>
        <button onclick="showSection('home')" style="margin-top: 50px; background: none; border: 1px solid white; color: white; padding: 10px 30px; border-radius: 10px; cursor: pointer;">Zatvoriť</button>
    </div>

    <div id="weather-container">
        <img id="weather-icon" src="" style="display:none;">
        <div id="weather-temp">--°C</div>
    </div>

    <button id="btn-prev" class="btn-nav" onclick="changePhoto(-1)">❮</button>
    <button id="btn-next" class="btn-nav" onclick="changePhoto(1)">❯</button>

    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';
        let allPhotoIds = [];
        let currentIndex = 0;

        function showSection(section) {
            const home = document.getElementById('main-container');
            const media = document.getElementById('media-overlay');
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => item.classList.remove('active'));

            if (section === 'home') {
                home.style.display = 'flex';
                media.style.display = 'none';
                navItems[0].classList.add('active');
            } else if (section === 'media') {
                home.style.display = 'none';
                media.style.display = 'flex';
                navItems[1].classList.add('active');
            }
        }

        async function loadPhotoList() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const text = await response.text();
                allPhotoIds = text.split('\n').map(r => r.split(',')[3]).filter(id => id && id.length > 20).map(id => id.replace(/"/g, '').trim());
                if(allPhotoIds.length > 0) showPhoto(0);
            } catch (e) { console.error(e); }
        }

        function showPhoto(index) {
            currentIndex = (index + allPhotoIds.length) % allPhotoIds.length;
            const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${allPhotoIds[currentIndex]}`;
            document.getElementById('bg').style.backgroundImage = `url('${imgUrl}')`;
        }

        function changePhoto(dir) { showPhoto(currentIndex + dir); }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-temp').innerText = Math.round(data.current_weather.temperature) + '°C';
                const img = document.getElementById('weather-icon');
                img.src = `https://openweathermap.org/img/wn/01d@2x.png`;
                img.style.display = 'block';
            } catch(e) {}
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        setInterval(updateWeather, 900000);
        loadPhotoList();
        updateWeather();
        updateTime();
    </script>
</body>
</html>
