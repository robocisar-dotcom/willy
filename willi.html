<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Willy Dashboard</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:'Segoe UI'; }
#clock { font-size:120px; text-align:center; margin-top:100px; }
#date-sk { text-align:center; font-size:30px; }
#agenda-box { text-align:center; margin-top:40px; }
</style>
</head>

<body>

<div id="clock"></div>
<div id="date-sk"></div>
<div id="agenda-box"></div>

<div id="w-temp" style="position:absolute;top:20px;right:20px">--°C</div>
<div id="w-icon" style="position:absolute;top:50px;right:20px">--</div>

<script>

const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

function updateClock(){
    let now = new Date();
    clock.innerText = now.toLocaleTimeString('sk-SK',{hour:'2-digit',minute:'2-digit'});
    date_sk.innerText = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}

async function updateWeather(){
    try{
        let res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.3775&longitude=17.5883&current=temperature_2m,weather_code');
        let data = await res.json();

        document.getElementById('w-temp').innerText = Math.round(data.current.temperature_2m) + "°C";

        let code = data.current.weather_code;
        let icon = "☀️";

        if(code <= 3) icon = "🌤️";
        else if(code < 50) icon = "☁️";
        else if(code < 70) icon = "🌧️";
        else icon = "❄️";

        document.getElementById('w-icon').innerText = icon;

    }catch(e){
        console.log("weather error:", e);
        document.getElementById('w-temp').innerText = "ERR";
    }
}

async function updateAgenda(){
    try{
        let res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        let txt = await res.text();

        console.log("RAW:", txt.substring(0,100)); // 🔥 debug

        let json = JSON.parse(txt.substring(47).slice(0,-2));

        let now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            let val = r.c[1]?.f || r.c[1]?.v || "";

            console.log("ROW DATE:", val); // 🔥 debug

            let isToday =
                val.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) ||
                val.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

            if(!isToday) return;

            let C = r.c[2]?.v || "";
            let D = r.c[3]?.v || "";

            html += `<div>⭐ ${D || C}</div>`;
            found++;
        });

        if(!found){
            html = "⚠️ nič na dnes";
        }

        agenda_box.innerHTML = html;

    }catch(e){
        console.log("agenda error:", e);
        agenda_box.innerHTML = "❌ chyba";
    }
}

updateClock();
updateWeather();
updateAgenda();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);
setInterval(updateAgenda,60000);

</script>
</body>
</html>
