<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Willy Dashboard</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        #bg { 
            position: fixed; width: 100%; height: 100%; 
            z-index: -1; filter: brightness(0.5); 
            transition: background-image 2s ease-in-out; 
            background-size: cover; background-position: center;
            background-color: #111;
        }
        
        .page { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .active { display: flex; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #weather-box {
            position: absolute; top: 30px; left: 30px; text-align: left;
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;
            backdrop-filter: blur(10px); z-index: 10;
        }

        #clock { font-size: 10rem; font-weight: 100; line-height: 1; }
        #date-sk { font-size: 2.5rem; font-weight: 300; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; margin-top: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; font-size: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }

        #nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: rgba(0,0,0,0.8); padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn { color: #888; text-align: center; flex: 1; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active-nav { color: #fff; font-weight: bold; }
        .nav-btn span { font-size: 1.8rem; display: block; }
    </style>
</head>
<body>

<div id="bg"></div>

<div id="weather-box">
    <div id="w-icon" style="font-size: 3rem;">☀️</div>
    <div id="w-temp" style="font-size: 2.5rem;">--°C</div>
</div>

<div id="p1" class="page active">
    <div id="clock">00:00</div>
    <div id="date-sk">Načítavam...</div>
</div>

<div id="p2" class="page">
    <h1>Multimédiá</h1>
    <div class="grid">
        <div class="card" onclick="location.reload()">🔄 Obnoviť</div>
        <div class="card">📻 Rádio 80s</div>
        <div class="card">🎵 Spotify</div>
        <div class="card">📺 YouTube</div>
    </div>
</div>

<div id="p3" class="page"><h1>Môj Dom</h1></div>
<div id="p4" class="page"><h1>Ekosystém</h1></div>

<nav id="nav">
    <div class="nav-btn active-nav" onclick="showPage('p1', this)"><span>🏠</span>DOMOV</div>
    <div class="nav-btn" onclick="showPage('p2', this)"><span>🎵</span>MÉDIÁ</div>
    <div class="nav-btn" onclick="showPage('p3', this)"><span>📱</span>DOM</div>
    <div class="nav-btn" onclick="showPage('p4', this)"><span>🌿</span>FLÓRA</div>
</nav>

<script>
    const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active-nav');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('date-sk').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
    }

    async function updateBackground() {
        try {
            // Skúsime načítať tabuľku (hárok "sekcie foto")
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=sekcie%20foto`;
            const response = await fetch(url);
            const text = await response.text();
            // Vyčistíme JSON dáta od balastu Google
            const json = JSON.parse(text.substring(47).slice(0, -2));
            
            // Vytiahneme ID zo stĺpca D (index 3)
            const ids = json.table.rows
                .map(r => (r.c && r.c[3]) ? r.c[3].v : null)
                .filter(id => id && id.length > 10);

            if (ids.length > 0) {
                const randomId = ids[Math.floor(Math.random() * ids.length)];
                // Použijeme stabilnejší formát linku pre náhľad
                const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                
                const bg = document.getElementById('bg');
                const img = new Image();
                img.src = imgUrl;
                img.onload = () => {
                    bg.style.backgroundImage = `url('${imgUrl}')`;
                };
            }
        } catch (e) {
            console.error("Chyba pri fotkách:", e);
        }
    }

    setInterval(updateClock, 1000);
    setInterval(updateBackground, 30000); // Každých 30 sekúnd nová fotka
    
    updateClock();
    updateBackground();
</script>

</body>
</html>
