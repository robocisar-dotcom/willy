<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Willy Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center center; transition: 1.5s; filter: brightness(0.4); background-color: #111; }
        
        /* SIDE NAV */
        #side-nav { position: fixed; left: 0; top: 0; height: 100vh; width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; z-index: 100; }
        .nav-item { cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; border-radius: 20px; }
        .nav-item i { font-size: 3.5rem; }
        .icon-home { color: #4285F4; }
        .icon-media { color: #EA4335; }
        .icon-light { color: #FBBC05; }
        .icon-flora { color: #34A853; }
        .nav-item.active { background: rgba(255,255,255,0.15); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

        /* MAIN CLOCK */
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-left: 100px; }
        #clock { font-size: 13rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }
        #date { font-size: 2.5rem; opacity: 0.9; margin-top: 20px; font-weight: 300; text-transform: capitalize; }

        /* OVERLAYS */
        .overlay { display: none; position: fixed; top: 0; left: 100px; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        .media-grid { display: flex; gap: 30px; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; width: 250px; text-align: center; text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card i { font-size: 5rem; margin-bottom: 15px; }

        /* WEATHER */
        #weather-container { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #weather-temp { font-size: 2.5rem; font-weight: bold; }

        .btn-close { margin-top: 60px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <nav id="side-nav">
        <div id="nav-home" class="nav-item active" onclick="showSection('home')"><i class="material-icons icon-home">home</i></div>
        <div id="nav-media" class="nav-item" onclick="showSection('media')"><i class="material-icons icon-media">music_note</i></div>
        <div id="nav-light" class="nav-item" onclick="showSection('light')"><i class="material-icons icon-light">lightbulb</i></div>
        <div id="nav-flora" class="nav-item" onclick="showSection('home')"><i class="material-icons icon-flora">local_florist</i></div>
    </nav>

    <div id="media-overlay" class="overlay">
        <h1 style="font-size: 3rem; margin-bottom: 40px;">Hudba</h1>
        <div class="media-grid">
            <a href="https://www.kiss.cz/" target="_blank" class="card">
                <i class="material-icons" style="color: #EA4335;">radio</i>
                <h2>Rádio KISS</h2>
            </a>
            <a href="spotify:home" class="card">
                <i class="material-icons" style="color: #1DB954;">play_circle_filled</i>
                <h2>Spotify</h2>
            </a>
        </div>
        <button class="btn-close" onclick="showSection('home')">Späť</button>
    </div>

    <div id="light-overlay" class="overlay">
        <h1 style="font-size: 3rem; margin-bottom: 40px; color: #FBBC05;">Osvetlenie</h1>
        <div class="media-grid">
            <a href="https://home.google.com/" target="_blank" class="card" style="border-color: #FBBC05;">
                <i class="material-icons" style="color: #FBBC05;">tungsten</i>
                <h2>Google Home</h2>
            </a>
        </div>
        <button class="btn-close" onclick="showSection('home')">Späť</button>
    </div>

    <div id="weather-container"><div id="weather-temp">--°C</div></div>
    
    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';

        function showSection(section) {
            const home = document.getElementById('main-container');
            const media = document.getElementById('media-overlay');
            const light = document.getElementById('light-overlay');
            
            home.style.display = 'none';
            media.style.display = 'none';
            light.style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

            if (section === 'home') {
                home.style.display = 'flex';
                document.getElementById('nav-home').classList.add('active');
            } else if (section === 'media') {
                media.style.display = 'flex';
                document.getElementById('nav-media').classList.add('active');
            } else if (section === 'light') {
                light.style.display = 'flex';
                document.getElementById('nav-light').classList.add('active');
            }
        }

        async function loadPhotoList() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const text = await response.text();
                const ids = text.split('\n').map(r => r.split(',')[3]).filter(id => id && id.length > 20).map(id => id.replace(/"/g, '').trim());
                if(ids.length > 0) {
                    const randomId = ids[Math.floor(Math.random()*ids.length)];
                    document.getElementById('bg').style.backgroundImage = `url('https://drive.google.com/thumbnail?sz=w1920&id=${randomId}')`;
                }
            } catch (e) { console.log("Chyba fotiek:", e); }
        }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-temp').innerText = Math.round(data.current_weather.temperature) + '°C';
            } catch(e) { console.log("Chyba pocasia:", e); }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        setInterval(updateWeather, 900000); // 15 min
        setInterval(loadPhotoList, 600000); // 10 min
        
        // Spustenie pri štarte
        updateTime();
        updateWeather();
        loadPhotoList();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
