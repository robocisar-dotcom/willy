<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard Pro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; 
              background-size: cover; background-position: center center; 
              transition: 1s ease-in-out; filter: brightness(0.6); background-color: #111; }
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #clock { font-size: 8rem; font-weight: 100; margin: 0; line-height: 1; }
        #date { font-size: 2rem; opacity: 0.8; margin-top: 10px; }
        #weather-container { display: flex; align-items: center; justify-content: center; margin-top: 15px; font-size: 2rem; }
        #weather-icon { width: 60px; height: 60px; }
        
        /* Tlačidlá */
        .btn-nav { position: absolute; top: 50%; padding: 20px; background: rgba(255,255,255,0.1); color: white; border: none; cursor: pointer; font-size: 2rem; border-radius: 10px; }
        #btn-prev { left: 20px; }
        #btn-next { right: 20px; }

        #nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; display: flex; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; opacity: 0.4; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); border-top: 3px solid #fff; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <button id="btn-prev" class="btn-nav" onclick="changePhoto(-1)">❮</button>
    <button id="btn-next" class="btn-nav" onclick="changePhoto(1)">❯</button>

    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
        <div id="weather-container">
            <img id="weather-icon" src="" style="display:none;">
            <span id="weather-temp"></span>
        </div>
    </div>

    <nav id="nav-bar">
        <div class="nav-item active">DOMOV</div>
        <div class="nav-item">MÉDIÁ</div>
        <div class="nav-item">DOM</div>
        <div class="nav-item">FLÓRA</div>
    </nav>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';
        
        let allPhotoIds = [];
        let currentIndex = 0;

        async function loadPhotoList() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const text = await response.text();
                allPhotoIds = text.split('\n').map(r => r.split(',')[3]).filter(id => id && id.length > 20).map(id => id.replace(/"/g, '').trim());
                if(allPhotoIds.length > 0) showPhoto(0);
            } catch (e) { console.error(e); }
        }

        function showPhoto(index) {
            currentIndex = (index + allPhotoIds.length) % allPhotoIds.length;
            const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${allPhotoIds[currentIndex]}`;
            const bg = document.getElementById('bg');
            const temp = new Image();
            temp.src = imgUrl;
            temp.onload = () => { bg.style.backgroundImage = `url('${imgUrl}')`; };
        }

        function changePhoto(dir) { showPhoto(currentIndex + dir); }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current_weather=true`);
                const data = await res.json();
                document.getElementById('weather-temp').innerText = Math.round(data.current_weather.temperature) + '°C';
                document.getElementById('weather-icon').style.display = 'block';
            } catch(e) {}
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        loadPhotoList();
        updateWeather();
        updateTime();
    </script>
</body>
</html>
