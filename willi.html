
<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Willy Dashboard</title>

<style>
:root{
    --bg:#000;
    --text:#fff;
    --card:rgba(255,255,255,0.08);
    --card-border:rgba(255,255,255,0.12);

    --clock-size:clamp(4.5rem,15vw,12rem);
    --date-size:clamp(1.2rem,3vw,2.2rem);
    --agenda-size:clamp(1.2rem,2.5vw,2rem);

    --weather-icon:clamp(2.6rem,8vw,6rem);
    --weather-temp:clamp(1.6rem,5vw,3.5rem);

    --nav-text:clamp(0.72rem,1.6vw,1rem);

    --page-top:clamp(24px,6vh,70px);
    --page-side:clamp(14px,3vw,28px);
    --bottom-pad:calc(100px + env(safe-area-inset-bottom));
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:#111;
}

/* WEATHER */
#weather-box{
    position:absolute;
    top:15px;
    right:15px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:20px;
    text-align:center;
    backdrop-filter:blur(20px);
}

#battery{
    position:absolute;
    top:15px;
    right:160px;
    background:rgba(0,0,0,0.6);
    padding:8px 14px;
    border-radius:20px;
}

#forecast{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:10px;
}

.f-day{
    display:flex;
    justify-content:space-between;
}

/* PAGES */
.page{display:none;height:100vh;padding:var(--page-top) var(--page-side) var(--bottom-pad);}
.page.active{display:block;}

.home-wrap{
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* NAV */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#000;
}

.nav-btn{
    flex:1;
    text-align:center;
    padding:10px;
    cursor:pointer;
}

.nav-btn.active-nav{
    color:#aaa;
}

/* GRID */
.media-grid,.dom-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    padding:20px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="battery">🔋 --%</div>

<div id="weather-box">
    <div id="w-icon">--</div>
    <div id="w-temp">--°C</div>

    <div id="forecast">
        <div class="f-day"><span>--</span><span>--°</span></div>
        <div class="f-day"><span>--</span><span>--°</span></div>
    </div>
</div>

<!-- DOMOV -->
<div id="p1" class="page active">
<div class="home-wrap">
<div id="clock">00:00</div>
<div id="date-sk">...</div>
</div>
</div>

<!-- MEDIA -->
<div id="p2" class="page">
<div class="media-grid">
<div class="card" onclick="playRadio('https://stream.funradio.sk/fun128.mp3','Fun')">Fun</div>
<div class="card" onclick="playRadio('https://stream.expres.sk/128.mp3','Expres')">Expres</div>
</div>
</div>

<!-- DOM -->
<div id="p3" class="page">
<div class="dom-grid">
<div class="card" onclick="openGoogleHome()">Google Home</div>
</div>
</div>

<nav id="nav">
<div class="nav-btn active-nav" onclick="showPage('p1',this)">DOMOV</div>
<div class="nav-btn" onclick="showPage('p2',this)">MEDIA</div>
<div class="nav-btn" onclick="showPage('p3',this)">DOM</div>
</nav>

<audio id="audioPlayer"></audio>

<script>
const audioPlayer=document.getElementById('audioPlayer');

/* CLOCK */
setInterval(()=>{
const now=new Date();
document.getElementById('clock').innerText=
now.getHours().toString().padStart(2,'0')+":"+
now.getMinutes().toString().padStart(2,'0');
},1000);

/* BATTERY */
async function updateBattery(){
if(navigator.getBattery){
const b=await navigator.getBattery();
const update=()=>document.getElementById('battery').innerText=`🔋 ${Math.round(b.level*100)}%`;
update();
b.addEventListener('levelchange',update);
}}
updateBattery();

/* NAV */
function showPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-nav'));

document.getElementById(id).classList.add('active');
btn.classList.add('active-nav');

document.getElementById('weather-box').style.display=(id==='p1')?'block':'none';
}

/* RADIO */
async function playRadio(url,name){
try{
audioPlayer.pause();
audioPlayer.src="";
audioPlayer.load();

audioPlayer.src=url;
await audioPlayer.play();

}catch(e){
alert("Radio nejde");
}
}

/* GOOGLE HOME */
function openGoogleHome(){
window.open("https://home.google.com","_blank");
}
</script>

</body>
</html>
