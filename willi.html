<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; filter: brightness(0.5); background-size: cover; background-position: center; transition: 2s; background-color: #111; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #clock { font-size: 10rem; font-weight: 100; margin: 0; }
        #date { font-size: 2.5rem; opacity: 0.8; margin-top: 10px; }
        #status { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>
    <div id="status">Starting...</div>

    <script>
        const sheetId = '1vTC382du3NGc6b_DugnxS1y3-p-Yt1iBJ63cmkTIEIp8';

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
            const dateStr = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
            document.getElementById('clock').innerText = timeStr;
            document.getElementById('date').innerText = dateStr;
        }

        async function updateBackground() {
            const status = document.getElementById('status');
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                const photoIds = json.table.rows
                    .map(row => (row.c && row.c[3] && row.c[3].v) ? row.c[3].v.toString().trim() : null)
                    .filter(id => id && id.length > 20);

                if (photoIds.length > 0) {
                    const randomId = photoIds[Math.floor(Math.random() * photoIds.length)];
                    const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                    
                    const bg = document.getElementById('bg');
                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = () => {
                        bg.style.backgroundImage = `url('${imgUrl}')`;
                        status.innerText = "Sync: OK " + new Date().toLocaleTimeString();
                    };
                } else {
                    status.innerText = "No IDs in column D";
                }
            } catch (error) {
                status.innerText = "Error: Connection";
                console.error(error);
            }
        }

        setInterval(updateClock, 1000);
        setInterval(updateBackground, 60000);

        updateClock();
        updateBackground();
    </script>
</body>
</html>
