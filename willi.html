<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Willy Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; filter: brightness(0.5); background-size: cover; background-position: center; transition: 2s; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #clock { font-size: 10rem; font-weight: 100; margin: 0; }
        #date { font-size: 2.5rem; opacity: 0.8; }
        #status { position: fixed; bottom: 80px; width: 100%; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>
    <div id="status">Pripravujem fotky...</div>

    <script>
        // TVOJE ID Z FOTO 17
        const sheetId = '1vTC382du3NGc6b_DugnxS1y3-p-Yt1iBJ63cmkTIEIp8';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        async function updateBG() {
            const status = document.getElementById('status');
            try {
                // Použijeme CSV export, ktorý si na foto 17 zverejnil - to je najistejšia cesta
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`);
                const data = await response.text();
                
                // Rozdelíme riadky a vezmeme stĺpec D (index 3)
                const rows = data.split('\n');
                const photoIds = [];
                
                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols[3]) {
                        const id = cols[3].replace(/"/g, '').trim();
                        if (id.length > 20) photoIds.push(id);
                    }
                }

                if (photoIds.length > 0) {
                    const randomId = photoIds[Math.floor(Math.random() * photoIds.length)];
                    const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                    
                    const bg = document.getElementById('bg');
                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = () => {
                        bg.style.backgroundImage = `url('${imgUrl}')`;
                        status.innerText = "Aktualizované: " + new Date().toLocaleTimeString();
                    };
                } else {
                    status.innerText = "Chyba: V stĺpci D nie sú žiadne ID kódov.";
                }
            } catch (e) {
                status.innerText = "Chyba pripojenia k tabuľke.";
            }
        }

        setInterval(updateClock, 1000);
        setInterval(updateBG, 60000); // Zmena fotky každú minútu
        updateClock();
        updateBG();
    </script>
</body>
</html>

</body>
</html>
