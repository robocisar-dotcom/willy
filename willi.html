
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; transition: 2s; filter: brightness(0.6); background-color: #111; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #clock { font-size: 10rem; font-weight: 100; margin: 0; }
        #date { font-size: 2.5rem; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        // Tvoje nové ID a GID (sekcia foto)
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
        const G_ID = '230699175';

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
        }

        async function updatePhoto() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`;
                const response = await fetch(url);
                const csvText = await response.text();
                
                const rows = csvText.split('\n');
                const photoIds = rows.map(row => {
                    const cols = row.split(',');
                    return cols[3] ? cols[3].replace(/"/g, '').trim() : null;
                }).filter(id => id && id.length > 20);

                if (photoIds.length > 0) {
                    const randomId = photoIds[Math.floor(Math.random() * photoIds.length)];
                    const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                    const bg = document.getElementById('bg');
                    const tempImg = new Image();
                    tempImg.src = imgUrl;
                    tempImg.onload = () => {
                        bg.style.backgroundImage = `url('${imgUrl}')`;
                    };
                }
            } catch (err) {
                console.error("Chyba:", err);
            }
        }

        setInterval(updateTime, 1000);
        setInterval(updatePhoto, 60000);
        updateTime();
        updatePhoto();
    </script>
</body>
</html>
