<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Willy Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; transition: 1.5s; filter: brightness(0.4); background-color: #111; }
        
        /* Navigácia */
        #side-nav { position: fixed; left: 0; top: 0; height: 100vh; width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; z-index: 100; background: rgba(0,0,0,0.2); }
        .nav-item { cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; border-radius: 20px; }
        .nav-item i { font-size: 3.5rem; }
        .icon-home { color: #4285F4; }
        .icon-light { color: #FBBC05; }
        .active { background: rgba(255,255,255,0.15); }

        /* Hlavná časť */
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-left: 100px; }
        #clock { font-size: 13rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #date { font-size: 2.5rem; opacity: 0.8; margin-top: 20px; text-transform: capitalize; }

        /* Integrovaný prehrávač */
        #radio-mini-player { margin-top: 40px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .play-btn { cursor: pointer; font-size: 3.5rem !important; color: #EA4335; }
        .radio-label { font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }

        /* Počasie */
        #weather-container { position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); padding: 12px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        #weather-temp { font-size: 2.5rem; font-weight: bold; }
        #weather-icon { font-size: 3rem; color: #FBBC05; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <nav id="side-nav">
        <div id="nav-home" class="nav-item active" onclick="showSection('home')"><i class="material-icons icon-home">home</i></div>
        <div id="nav-light" class="nav-item" onclick="showSection('light')"><i class="material-icons icon-light">lightbulb</i></div>
    </nav>

    <div id="weather-container">
        <i id="weather-icon" class="material-icons">wb_sunny</i>
        <div id="weather-temp">--°C</div>
    </div>

    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
        
        <div id="radio-mini-player">
            <span class="radio-label">RÁDIO KISS</span>
            <i id="play-icon" class="material-icons play-btn" onclick="toggleRadio()">play_circle_filled</i>
            <audio id="radio-stream" src="https://icecast7.play.cz/kiss128.mp3"></audio>
        </div>
    </div>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';

        const audio = document.getElementById('radio-stream');
        const playIcon = document.getElementById('play-icon');

        function toggleRadio() {
            if (audio.paused) { 
                audio.play().catch(e => alert("Najprv klikni niekam na plochu, potom hraj. Chrome blokuje auto-štart.")); 
                playIcon.innerText = 'pause_circle_filled'; 
            } else { 
                audio.pause(); 
                playIcon.innerText = 'play_circle_filled'; 
            }
        }

        function showSection(s) {
            if (s === 'light') {
                window.location.href = 'https://home.google.com/home/1-5c1caa74efc1c6928a286a13ccfe4130cffd72956fd397a2bdc236d4f3c1d328/devices';
                return;
            }
        }

        async function loadData() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const data = await response.text();
                const rows = data.split('\n');
                const photoIds = rows.map(row => row.split(',')[3]).filter(id => id && id.trim().length > 20);
                
                if (photoIds.length > 0) {
                    const rawId = photoIds[Math.floor(Math.random() * photoIds.length)].trim().replace(/"/g, '');
                    // Nový spôsob linkovania fotky
                    const imgUrl = `https://drive.google.com/uc?export=view&id=${rawId}`;
                    
                    const img = new Image();
                    img.onload = function() {
                        document.getElementById('bg').style.backgroundImage = `url('${imgUrl}')`;
                    };
                    img.src = imgUrl;
                }
            } catch (e) { console.error("Chyba fotiek"); }

            try {
                const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current_weather=true`);
                const d = await r.json();
                document.getElementById('weather-temp').innerText = Math.round(d.current_weather.temperature) + '°C';
                const code = d.current_weather.weathercode;
                const icon = document.getElementById('weather-icon');
                if (code <= 3) icon.innerText = 'wb_sunny';
                else if (code <= 67) icon.innerText = 'cloudy_snowing';
                else icon.innerText = 'cloud';
            } catch (e) {}
        }

        function updateTime() {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = n.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        setInterval(loadData, 600000);
        updateTime();
        loadData();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
        }
    </script>
</body>
</html>
