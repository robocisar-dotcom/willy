<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* POZADIE */
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; 
              background-size: cover; background-position: center center; 
              transition: 1.5s ease-in-out; filter: brightness(0.5); background-color: #111; }
        
        /* POČASIE V PRAVOM HORNOM ROHU */
        #weather-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; text-align: right; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #weather-icon { width: 70px; height: 70px; }
        #weather-temp { font-size: 2.5rem; font-weight: bold; }
        #weather-feels { font-size: 0.9rem; opacity: 0.7; }

        /* HODINY - HRUBÉ A VÝRAZNÉ */
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #clock { font-size: 13rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }
        #date { font-size: 2.5rem; opacity: 0.9; margin-top: 20px; font-weight: 300; text-transform: capitalize; }
        
        /* TLAČIDLÁ PREPÍNANIA FOTIEK */
        .btn-nav { position: absolute; top: 50%; transform: translateY(-50%); padding: 50px 20px; background: rgba(255,255,255,0.02); color: white; border: none; cursor: pointer; font-size: 3rem; border-radius: 15px; transition: 0.3s; z-index: 10; }
        .btn-nav:hover { background: rgba(255,255,255,0.1); }
        #btn-prev { left: 5px; }
        #btn-next { right: 5px; }

        /* DOLNÁ LIŠTA - LEN IKONY */
        #nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; display: flex; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.3; transition: 0.4s; cursor: pointer; }
        .nav-item i { font-size: 3rem; } /* Väčšie ikony namiesto textu */
        
        .nav-item.active { opacity: 1; color: #fff; background: rgba(255,255,255,0.08); border-top: 5px solid #fff; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="weather-container">
        <img id="weather-icon" src="" style="display:none;">
        <div id="weather-temp">--°C</div>
        <div id="weather-feels">Pocitovo --°C</div>
    </div>

    <button id="btn-prev" class="btn-nav" onclick="changePhoto(-1)">❮</button>
    <button id="btn-next" class="btn-nav" onclick="changePhoto(1)">❯</button>

    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <nav id="nav-bar">
        <div class="nav-item active">
            <i class="material-icons">home</i>
        </div>
        <div class="nav-item">
            <i class="material-icons">play_circle_filled</i>
        </div>
        <div class="nav-item">
            <i class="material-icons">lightbulb</i>
        </div>
        <div class="nav-item">
            <i class="material-icons">local_florist</i>
        </div>
    </nav>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';
        
        let allPhotoIds = [];
        let currentIndex = 0;

        async function loadPhotoList() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const text = await response.text();
                allPhotoIds = text.split('\n').map(r => r.split(',')[3]).filter(id => id && id.length > 20).map(id => id.replace(/"/g, '').trim());
                if(allPhotoIds.length > 0) showPhoto(0);
            } catch (e) { console.error("Chyba tabuľky:", e); }
        }

        function showPhoto(index) {
            currentIndex = (index + allPhotoIds.length) % allPhotoIds.length;
            const imgId = allPhotoIds[currentIndex];
            const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${imgId}`;
            const bg = document.getElementById('bg');
            const temp = new Image();
            temp.src = imgUrl;
            temp.onload = () => { bg.style.backgroundImage = `url('${imgUrl}')`; };
        }

        function changePhoto(dir) { showPhoto(currentIndex + dir); }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current_weather=true&hourly=apparent_temperature`);
                const data = await res.json();
                
                const temp = Math.round(data.current_weather.temperature);
                const feels = Math.round(data.hourly.apparent_temperature[0]);
                const code = data.current_weather.weathercode;
                
                let icon = '01d'; 
                if (code >= 1 && code <= 3) icon = '02d';
                else if (code >= 45 && code <= 48) icon = '50d';
                else if (code >= 51 && code <= 67) icon = '09d';
                else if (code >= 80) icon = '10d';

                const img = document.getElementById('weather-icon');
                img.src = `https://openweathermap.org/img/wn/${icon}@2x.png`;
                img.style.display = 'block';
                
                document.getElementById('weather-temp').innerText = temp + '°C';
                document.getElementById('weather-feels').innerText = `Pocitovo ${feels}°C`;
            } catch(e) { console.error("Chyba počasia:", e); }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        setInterval(updateWeather, 900000); 
        setInterval(() => changePhoto(1), 120000); 
        
        loadPhotoList();
        updateWeather();
        updateTime();
    </script>
</body>
</html>
