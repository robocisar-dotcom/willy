<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WILLI - Smart Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* --- HLAVNÁ STRÁNKA (HERO) --- */
        .hero {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
        }

        #clock {
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 300;
            letter-spacing: -2px;
            margin: 0;
            color: var(--text-main);
        }

        #date {
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .radio-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-off {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-off:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* --- Mriežka s kartami --- */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            padding: 10px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
        }

        /* --- Tlačidlá --- */
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-action {
            background: #334155;
            border: none;
            color: white;
            padding: 18px 10px;
            border-radius: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .btn-action:active {
            transform: scale(0.95);
            background: var(--accent);
        }

        .btn-full { grid-column: span 2; background: #0ea5e9; }

        /* Status indikátor */
        .status { font-size: 0.7rem; opacity: 0.6; }

    </style>
</head>
<body>

    <section class="hero">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
        
        <div class="radio-controls">
            <div id="radio-status" class="status">Rádio vypnuté</div>
            <button class="btn-off" onclick="stopRadio()">Vypnúť rádio ✖</button>
        </div>
    </section>

    <main class="dashboard">
        
        <div class="card">
            <h2><span>📻</span> Multimédia</h2>
            <div class="grid-buttons">
                <button class="btn-action" onclick="playRadio('https://stream.funradio.sk/fun128.mp3', 'Fun Rádio')">Fun Rádio</button>
                <button class="btn-action" onclick="playRadio('https://stream.vlna.sk/vlna128.mp3', 'Rádio Vlna')">Rádio Vlna</button>
                <button class="btn-action" onclick="playRadio('https://expres.sk/stream', 'Rádio Expres')">Expres</button>
                <button class="btn-action" onclick="playRadio('https://icecast.kiss.cz/kiss128.mp3', 'Rádio Kiss')">Radio Kiss</button>
                <button class="btn-action btn-full" onclick="openSpotify()">Spotify Web</button>
            </div>
        </div>

        <div class="card">
            <h2><span>💡</span> Svetlá & Zásuvky</h2>
            <div class="grid-buttons">
                <button class="btn-action" onclick="controlSinric('ID_SVETLO_1', 'on')">Svetlo 1</button>
                <button class="btn-action" onclick="controlSinric('ID_SVETLO_2', 'on')">Svetlo 2</button>
                <button class="btn-action" onclick="controlSinric('ID_ZASUVKA_1', 'on')">Zásuvka PC</button>
                <button class="btn-action" onclick="controlSinric('ID_TAPO_1', 'on')">Tapo Lampa</button>
            </div>
        </div>

        <div class="card">
            <h2><span>🌿</span> Vzduch & Závlaha</h2>
            <div class="grid-buttons">
                <button class="btn-action btn-full" onclick="controlESP('vzduch', 'toggle')">Vzduchotechnika</button>
                <button class="btn-action btn-full" style="background: #0369a1;" onclick="controlESP('voda', 'on')">Zaliať kvety 💧</button>
            </div>
            <p style="text-align: center; font-size: 0.8rem; margin-top: 15px; color: var(--text-dim);">
                Čaká sa na definíciu cyklov...
            </p>
        </div>

    </main>

    <audio id="audioPlayer"></audio>

    <script>
        // HODINY A DÁTUM
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').innerText = `${h}:${m}`; // Bez sekúnd pre čistý dizajn, alebo pridaj ${s}
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // RÁDIO FUNKCIE
        const player = document.getElementById('audioPlayer');
        const statusText = document.getElementById('radio-status');

        function playRadio(url, name) {
            player.src = url;
            player.play();
            statusText.innerText = `Hrá: ${name}`;
            statusText.style.color = "#38bdf8";
        }

        function stopRadio() {
            player.pause();
            player.src = "";
            statusText.innerText = "Rádio vypnuté";
            statusText.style.color = "inherit";
        }

        function openSpotify() {
            window.open('https://open.spotify.com', '_blank');
        }

        // SMART HOME FUNKCIE (Sinric Pro / ESP)
        function controlSinric(deviceId, action) {
            console.log(`Posielam príkaz pre ${deviceId}: ${action}`);
            // Tu potom doplníme tvoj API kľúč a fetch volanie
            alert('Príkaz odoslaný do Sinric pre: ' + deviceId);
        }

        function controlESP(system, action) {
            console.log(`Ovládanie ${system}: ${action}`);
            // Logika pre vzduchotechniku a vodu
        }
    </script>
</body>
</html>
