<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Willy Dashboard</title>

<style>
:root{
    --bg: #000;
    --text: #fff;

    --clock-size: clamp(4.5rem, 15vw, 12rem);
    --date-size: clamp(1.2rem, 3vw, 2rem);

    --weather-icon: clamp(2.5rem, 6vw, 5rem);
    --weather-temp: clamp(1.5rem, 4vw, 3rem);
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:'Segoe UI', sans-serif;
}

/* POČASIE */
#weather-box{
    position:absolute;
    top:20px;
    right:20px;
    text-align:center;
}
#w-icon{ font-size:var(--weather-icon); }
#w-temp{ font-size:var(--weather-temp); }

/* DOMOV */
#clock{
    font-size:var(--clock-size);
    text-align:center;
    margin-top:80px;
}
#date-sk{
    text-align:center;
    font-size:var(--date-size);
}

/* STRÁNKY */
.page{ display:none; }
.active{ display:block; }

/* MENU */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111;
}
.nav-btn{
    flex:1;
    text-align:center;
    padding:15px;
    color:#777;
}
.nav-btn.active-nav{ color:#fff; }

/* RESPONSIVE */
@media (max-width: 600px){
    #clock{ font-size:8rem; }
}

@media (min-width: 1200px){
    #clock{ font-size:14rem; }
}
</style>
</head>

<body>

<!-- POČASIE -->
<div id="weather-box">
    <div id="w-icon">☀️</div>
    <div id="w-temp">--°C</div>
</div>

<!-- DOMOV -->
<div id="p1" class="page active">
    <div id="clock">00:00</div>
    <div id="date-sk">...</div>
</div>

<!-- MÉDIÁ -->
<div id="p2" class="page">
    <h1 style="text-align:center;">MÉDIÁ</h1>
</div>

<!-- MENU -->
<nav id="nav">
    <div class="nav-btn active-nav" onclick="showPage('p1',this)">DOMOV</div>
    <div class="nav-btn" onclick="showPage('p2',this)">MÉDIÁ</div>
</nav>

<script>
function showPage(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-nav'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active-nav');
}

function updateClock(){
    const n=new Date();
    document.getElementById('clock').innerText=
        n.getHours().toString().padStart(2,'0')+":"+
        n.getMinutes().toString().padStart(2,'0');

    document.getElementById('date-sk').innerText=
        n.toLocaleDateString('sk-SK',{
            weekday:'long',
            day:'numeric',
            month:'long'
        });
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
