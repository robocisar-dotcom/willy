<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Willy Dashboard</title>

<style>
:root{
    --bg: #000;
    --text: #fff;
    --card: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.12);
    --glass: rgba(0,0,0,0.6);

    --clock-size: clamp(4.5rem, 15vw, 12rem);
    --date-size: clamp(1.2rem, 3.2vw, 2.2rem);
    --agenda-size: clamp(1.2rem, 2.5vw, 2rem);

    --weather-icon: clamp(2.6rem, 8vw, 6rem);
    --weather-temp: clamp(1.6rem, 5vw, 3.5rem);

    --nav-icon: clamp(1.7rem, 4vw, 3rem);
    --nav-text: clamp(0.72rem, 1.6vw, 1rem);

    --page-top: clamp(24px, 6vh, 70px);
    --page-side: clamp(14px, 3vw, 28px);
    --bottom-pad: calc(100px + env(safe-area-inset-bottom));
}

/* 🔄 REFRESH BUTTON */
#refresh-btn{
    position:absolute;
    top:clamp(12px, 2vw, 20px);
    left:clamp(12px, 2vw, 20px);
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    width:clamp(44px, 6vw, 70px);
    height:clamp(44px, 6vw, 70px);
    border-radius:50%;
    font-size:clamp(1.2rem, 2.5vw, 2rem);
    backdrop-filter:blur(10px);
    cursor:pointer;
    z-index:20;
    transition:0.2s;
}
#refresh-btn:active{
    transform:scale(0.9) rotate(90deg);
}

*{ box-sizing:border-box; }

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI', sans-serif;
}

#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:#111;
}

/* POČASIE */
#weather-box{
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:20px;
}
#w-icon{ font-size:3rem; }
#w-temp{ font-size:2rem; font-weight:bold; }

/* STRÁNKY */
.page{ display:none; width:100%; height:100%; padding:60px 20px; }
.page.active{ display:block; }

/* DOMOV */
#clock{ font-size:var(--clock-size); text-align:center; }
#date-sk{ text-align:center; font-size:var(--date-size); }
#agenda-box{ text-align:center; margin-top:20px; }

/* GRID */
.media-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
.card{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
}
.card:active{ transform:scale(0.95); }

/* MENU */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:rgba(0,0,0,0.8);
}
.nav-btn{
    flex:1;
    text-align:center;
    padding:10px;
    color:#888;
}
.nav-btn.active-nav{ color:#fff; }
</style>
</head>

<body>

<div id="bg"></div>

<!-- 🔄 REFRESH -->
<button id="refresh-btn" onclick="manualRefresh()">🔄</button>

<!-- POČASIE -->
<div id="weather-box">
    <div id="w-icon">--</div>
    <div id="w-temp">--°C</div>
</div>

<!-- DOMOV -->
<div id="p1" class="page active">
    <div id="clock">00:00</div>
    <div id="date-sk">...</div>
    <div id="agenda-box"></div>
</div>

<!-- MÉDIÁ -->
<div id="p2" class="page">
    <div class="media-grid">
        <div class="card" onclick="playRadio('https://stream.funradio.sk/fun128.mp3')">Fun</div>
        <div class="card" onclick="playRadio('https://stream.vlna.sk/vlna128.mp3')">Vlna</div>
        <div class="card" onclick="playRadio('https://stream.expres.sk/128.mp3')">Expres</div>
        <div class="card" onclick="playRadio('https://icecast.kiss.cz/kiss128.mp3')">Kiss</div>
    </div>
    <button onclick="stopRadio()">STOP</button>
</div>

<!-- MENU -->
<nav id="nav">
    <div class="nav-btn active-nav" onclick="showPage('p1',this)">DOM</div>
    <div class="nav-btn" onclick="showPage('p2',this)">MEDIA</div>
</nav>

<audio id="audio"></audio>

<script>
const audio=document.getElementById("audio");

function showPage(id,btn){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active-nav"));
    document.getElementById(id).classList.add("active");
    btn.classList.add("active-nav");
}

function updateClock(){
    const n=new Date();
    document.getElementById("clock").innerText=
        n.getHours().toString().padStart(2,"0")+":"+
        n.getMinutes().toString().padStart(2,"0");
}

async function updateWeather(){
    let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.3&longitude=17.5&current=temperature_2m,weather_code");
    let d=await r.json();
    document.getElementById("w-temp").innerText=Math.round(d.current.temperature_2m)+"°C";
}

async function updateAgenda(){
    document.getElementById("agenda-box").innerText="OK";
}

function manualRefresh(){
    updateWeather();
    updateAgenda();
}

function playRadio(url){
    audio.src=url;
    audio.play();
}
function stopRadio(){
    audio.pause();
}

updateClock();
updateWeather();
updateAgenda();

setInterval(updateClock,1000);
</script>

</body>
</html>
