<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center center; transition: 1.5s; filter: brightness(0.4); background-color: #111; }
        
        /* BOČNÉ MENU */
        #side-nav { position: fixed; left: 0; top: 0; height: 100vh; width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; background: transparent; z-index: 100; }
        .nav-item { cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; border-radius: 20px; }
        .nav-item i { font-size: 3.5rem; }
        .icon-home { color: #4285F4; }
        .icon-media { color: #EA4335; }
        .icon-light { color: #FBBC05; }
        .icon-flora { color: #34A853; }
        .nav-item.active { background: rgba(255,255,255,0.15); }

        /* HODINY */
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-left: 100px; }
        #clock { font-size: 13rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }
        #date { font-size: 2.5rem; opacity: 0.9; margin-top: 20px; font-weight: 300; }

        /* MULTIMEDIÁLNY PANEL - VNÚTORNÉ OKNO */
        #media-overlay { display: none; position: fixed; top: 0; left: 100px; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 50; flex-direction: column; align-items: center; justify-content: center; }
        #player-container { width: 80%; height: 60%; background: #222; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); position: relative; }
        #player-frame { width: 100%; height: 100%; border: none; }
        .close-player { position: absolute; top: -50px; right: 0; color: white; background: none; border: 1px solid white; padding: 5px 20px; border-radius: 10px; cursor: pointer; }

        .media-grid { display: flex; gap: 30px; margin-top: 20px; }
        .media-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; width: 200px; text-align: center; cursor: pointer; transition: 0.3s; }
        .media-card:hover { background: rgba(255,255,255,0.1); }

        #weather-container { position: absolute; top: 20px; right: 20px; text-align: right; }
        #weather-temp { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <nav id="side-nav">
        <div id="nav-home" class="nav-item active" onclick="showSection('home')"><i class="material-icons icon-home">home</i></div>
        <div id="nav-media" class="nav-item" onclick="showSection('media')"><i class="material-icons icon-media">music_note</i></div>
        <div id="nav-light" class="nav-item"><i class="material-icons icon-light">lightbulb</i></div>
        <div id="nav-flora" class="nav-item"><i class="material-icons icon-flora">local_florist</i></div>
    </nav>

    <div id="media-overlay">
        <div id="grid-view" style="display: flex; flex-direction: column; align-items: center;">
            <h1 style="font-size: 3rem; margin-bottom: 40px;">Vyber hudbu</h1>
            <div class="media-grid">
                <div class="media-card" onclick="openPlayer('https://www.kiss.cz/')">
                    <i class="material-icons" style="font-size: 4rem; color: #EA4335;">radio</i>
                    <h2>Rádio KISS</h2>
                </div>
                <div class="media-card" onclick="openPlayer('https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGvYBM31')">
                    <i class="material-icons" style="font-size: 4rem; color: #1DB954;">play_circle_filled</i>
                    <h2>Spotify</h2>
                </div>
            </div>
            <button onclick="showSection('home')" style="margin-top: 40px; padding: 10px 30px; border-radius: 30px; border: 1px solid white; background: none; color: white; cursor: pointer;">Zavrieť</button>
        </div>

        <div id="player-view" style="display: none; flex-direction: column; align-items: center; width: 80%;">
            <div id="player-container">
                <button class="close-player" onclick="closePlayer()">SPÄŤ NA VÝBER</button>
                <iframe id="player-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <div id="weather-container">
        <div id="weather-temp">--°C</div>
    </div>

    <div id="main-container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        const S_ID = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8'; 
        const G_ID = '230699175';
        let allPhotoIds = [];
        let currentIndex = 0;

        function showSection(section) {
            const home = document.getElementById('main-container');
            const media = document.getElementById('media-overlay');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (section === 'home') {
                home.style.display = 'flex';
                media.style.display = 'none';
                document.getElementById('nav-home').classList.add('active');
            } else if (section === 'media') {
                home.style.display = 'none';
                media.style.display = 'flex';
                document.getElementById('nav-media').classList.add('active');
            }
        }

        function openPlayer(url) {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'flex';
            document.getElementById('player-frame').src = url;
        }

        function closePlayer() {
            document.getElementById('player-frame').src = '';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'flex';
        }

        async function loadPhotoList() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/export?format=csv&gid=${G_ID}`);
                const text = await response.text();
                allPhotoIds = text.split('\n').map(r => r.split(',')[3]).filter(id => id && id.length > 20).map(id => id.replace(/"/g, '').trim());
                if(allPhotoIds.length > 0) showPhoto(0);
            } catch (e) { console.error(e); }
        }

        function showPhoto(index) {
            currentIndex = (index + allPhotoIds.length) % allPhotoIds.length;
            const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${allPhotoIds[currentIndex]}`;
            document.getElementById('bg').style.backgroundImage = `url('${imgUrl}')`;
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        setInterval(updateTime, 1000);
        loadPhotoList();
        updateTime();
    </script>
</body>
</html>
