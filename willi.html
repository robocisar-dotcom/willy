<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Willy Dashboard</title>

<style>
:root{
    --bg: #000;
    --text: #fff;
    --card: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.12);

    --clock-size: clamp(4.5rem, 15vw, 12rem);
    --date-size: clamp(1.2rem, 3.2vw, 2.2rem);
    --agenda-size: clamp(1.2rem, 2.5vw, 2rem);

    --weather-icon: clamp(2.6rem, 8vw, 6rem);
    --weather-temp: clamp(1.6rem, 5vw, 3.5rem);
}

/* RESET */
*{ box-sizing:border-box; margin:0; }

body{
    background:#000;
    color:#fff;
    font-family:sans-serif;
}

/* BACKGROUND */
#bg{
    position:fixed;
    inset:0;
    z-index:-1;
    background:#111;
}

/* 🔄 REFRESH */
#refresh-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    width:50px;
    height:50px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
    z-index:20;
}

/* POČASIE */
#weather-box{
    position:absolute;
    top:20px;
    right:20px;
    text-align:center;
}

#w-icon{ font-size:var(--weather-icon); }
#w-temp{ font-size:var(--weather-temp); }

/* DOMOV */
.home{
    text-align:center;
    margin-top:120px;
}

#clock{
    font-size:var(--clock-size);
}

#date-sk{
    font-size:var(--date-size);
    margin-top:10px;
}

#agenda-box{
    margin-top:30px;
    font-size:var(--agenda-size);
}

/* MENU */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111;
}

.nav-btn{
    flex:1;
    text-align:center;
    padding:15px;
    color:#777;
}

.nav-btn.active{
    color:#fff;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- 🔄 REFRESH -->
<button id="refresh-btn" onclick="manualRefresh()">🔄</button>

<!-- POČASIE -->
<div id="weather-box">
    <div id="w-icon">--</div>
    <div id="w-temp">--°C</div>
</div>

<!-- DOMOV -->
<div class="home">
    <div id="clock">00:00</div>
    <div id="date-sk">...</div>
    <div id="agenda-box"></div>
</div>

<!-- MENU -->
<div id="nav">
    <div class="nav-btn active">DOMOV</div>
    <div class="nav-btn">MÉDIÁ</div>
</div>

<script>
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

/* CLOCK */
function updateClock(){
    const now = new Date();

    document.getElementById('clock').innerText =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById('date-sk').innerText =
        now.toLocaleDateString('sk-SK',{
            weekday:'long',
            day:'numeric',
            month:'long'
        });
}

/* WEATHER */
async function updateWeather(){
    try{
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.37&longitude=17.58&current=temperature_2m,weather_code');
        const data = await res.json();

        document.getElementById('w-temp').innerText =
            Math.round(data.current.temperature_2m) + "°C";

        document.getElementById('w-icon').innerText = "☀️";
    }catch(e){
        document.getElementById('w-temp').innerText = "ERR";
    }
}

/* AGENDA */
async function updateAgenda(){
    try{
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));

        const now = new Date();
        let text = "";

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            const val = r.c[1]?.f || r.c[1]?.v || "";

            if(val.includes(now.getDate()+".")){
                text = r.c[2]?.v || "";
            }
        });

        document.getElementById('agenda-box').innerText =
            text || "Žiadna dnešná udalosť";

    }catch(e){
        document.getElementById('agenda-box').innerText = "❌ chyba";
    }
}

/* 🔄 REFRESH */
function manualRefresh(){
    updateWeather();
    updateAgenda();
}

/* INIT */
updateClock();
updateWeather();
updateAgenda();

setInterval(updateClock,1000);
</script>

</body>
</html>
