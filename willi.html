<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willy Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; filter: brightness(0.5); background-size: cover; background-position: center; transition: 2s; background-color: #111; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #clock { font-size: 10rem; font-weight: 100; margin: 0; }
        #date { font-size: 2.5rem; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        const S_ID = '1vTC382du3NGc6b_DugnxS1y3-p-Yt1iBJ63cmkTIEIp8';

        function tick() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
        }

        async function loadImg() {
            try {
                const r = await fetch('https://docs.google.com/spreadsheets/d/' + S_ID + '/gviz/tq?tqx=out:json');
                const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                const ids = j.table.rows
                    .map(row => (row.c && row.c[3] && row.c[3].v) ? row.c[3].v.toString().trim() : null)
                    .filter(id => id && id.length > 20);

                if (ids.length > 0) {
                    const id = ids[Math.floor(Math.random() * ids.length)];
                    const url = 'https://drive.google.com/thumbnail?sz=w1920&id=' + id;
                    const img = new Image();
                    img.src = url;
                    img.onload = () => { document.getElementById('bg').style.backgroundImage = 'url(' + url + ')'; };
                }
            } catch (e) { console.log('Error'); }
        }

        setInterval(tick, 1000);
        setInterval(loadImg, 60000);
        tick();
        loadImg();
    </script>
</body>
</html>
