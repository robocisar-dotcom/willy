<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Willy Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Pozadie pre fotky */
        #bg { 
            position: fixed; width: 100%; height: 100%; 
            z-index: -1; filter: brightness(0.4); 
            transition: background-image 2s ease-in-out; 
            background-size: cover; background-position: center;
            background-color: #111;
        }
        
        /* Hodiny a dátum */
        #container {
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center;
        }
        #clock { font-size: 12rem; font-weight: 100; line-height: 1; margin: 0; }
        #date { font-size: 3rem; font-weight: 300; margin-top: 10px; color: rgba(255,255,255,0.8); }

        /* Jednoduché menu dole */
        #nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: rgba(0,0,0,0.7); padding: 20px 0; backdrop-filter: blur(10px);
        }
        .nav-item { flex: 1; text-align: center; font-size: 1.2rem; opacity: 0.6; }
        .active { opacity: 1; font-weight: bold; border-bottom: 3px solid #fff; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="bg"></div>

<div id="container">
    <div id="clock">00:00</div>
    <div id="date">Načítavam...</div>
</div>

<nav id="nav">
    <div class="nav-item active">DOMOV</div>
    <div class="nav-item">MÉDIÁ</div>
    <div class="nav-item">DOM</div>
    <div class="nav-item">FLÓRA</div>
</nav>

<script>
    // TVOJE ID TABUĽKY
    const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';

    function updateClock() {
        const now = new Date();
        const time = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute: '2-digit'});
        const date = now.toLocaleDateString('sk-SK', {weekday: 'long', day: 'numeric', month: 'long'});
        
        document.getElementById('clock').innerText = time;
        document.getElementById('date').innerText = date;
    }

    async function updateBackground() {
        try {
            // Načítame dáta z tabuľky (prvý hárok)
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`);
            const text = await response.text();
            const json = JSON.parse(text.substring(47).slice(0, -2));
            
            // Vytiahneme ID zo stĺpca D (index 3)
            const photoIds = json.table.rows
                .map(row => (row.c && row.c[3]) ? row.c[3].v : null)
                .filter(id => id && id.length > 20);

            if (photoIds.length > 0) {
                // Vyberieme náhodnú fotku
                const randomId = photoIds[Math.floor(Math.random() * photoIds.length)];
                const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${randomId}`;
                
                // Plynulá zmena pozadia
                const bg = document.getElementById('bg');
                const tempImg = new Image();
                tempImg.src = imgUrl;
                tempImg.onload = () => {
                    bg.style.backgroundImage = `url('${imgUrl}')`;
                };
            }
        } catch (error) {
            console.error("Chyba pri načítaní fotiek:", error);
        }
    }

    // Spustíme hodiny každú sekundu
    setInterval(updateClock, 1000);
    // Fotku zmeníme každých 60 sekúnd
    setInterval(updateBackground, 60000);

    // Prvé spustenie hneď po načítaní
    updateClock();
    updateBackground();
</script>

</body>
</html>

    setInterval(updateBackground, 30000); // Každých 30 sekúnd nová fotka
    
    updateClock();
    updateBackground();
</script>

</body>
</html>
