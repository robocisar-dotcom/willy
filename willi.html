<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Willy Dashboard</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* 🌤 POČASIE */
#weather-box{
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.6);
    padding:22px 28px;
    border-radius:30px;
    text-align:center;
    backdrop-filter:blur(15px);
}

#w-icon{
    font-size:4.5rem; /* bolo 3.5 */
    line-height:1;
}

#w-temp{
    font-size:2.6rem; /* bolo 2rem */
    font-weight:800;
    margin-top:5px;
}

/* 🕒 */
#clock{
    font-size:clamp(6rem,20vh,14rem);
    text-align:center;
    margin-top:80px;
}

#date-sk{
    text-align:center;
    font-size:2rem;
}

/* 📅 */
#agenda-box{
    text-align:center;
    margin-top:30px;
    font-size:2rem;
}

/* 📱 NAV */
#nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(20px);
    padding:15px 0;
}

.nav-btn{
    flex:1;
    text-align:center;
    color:rgba(255,255,255,0.4);
    font-size:1rem;
}

.nav-btn span{
    display:block;
    font-size:3rem;
    margin-bottom:5px;
}

.nav-btn.active-nav{
    color:#fff;
    transform:translateY(-10px);
}

.page{ display:none; }
.active{ display:block; }
</style>
</head>

<body>

<!-- POČASIE -->
<div id="weather-box">
    <div id="w-icon">--</div>
    <div id="w-temp">--°C</div>
</div>

<!-- DOMOV -->
<div id="p1" class="page active">
    <div id="clock">00:00</div>
    <div id="date-sk">...</div>
    <div id="agenda-box"></div>
</div>

<div id="p2" class="page">🎵 Médiá</div>
<div id="p3" class="page">📱 Dom</div>
<div id="p4" class="page">🌿 Flóra</div>

<!-- MENU -->
<nav id="nav">
    <div class="nav-btn active-nav" onclick="showPage('p1',this)">
        <span>🏠</span>DOMOV
    </div>
    <div class="nav-btn" onclick="showPage('p2',this)">
        <span>🎵</span>MÉDIÁ
    </div>
    <div class="nav-btn" onclick="showPage('p3',this)">
        <span>📱</span>DOM
    </div>
    <div class="nav-btn" onclick="showPage('p4',this)">
        <span>🌿</span>FLÓRA
    </div>
</nav>

<script>

const sheetId='1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid='602623609';

/* 🕒 HODINY */
function updateClock(){
    const now=new Date();

    document.getElementById('clock').innerText=
        now.getHours().toString().padStart(2,'0')+":"+
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById('date-sk').innerText=
        now.toLocaleDateString('sk-SK',{
            weekday:'long',
            day:'numeric',
            month:'long'
        });
}

/* 📱 MENU */
function showPage(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active-nav'));
    document.getElementById(id).style.display='block';
    btn.classList.add('active-nav');
}

/* 🌤 POČASIE */
async function updateWeather(){
    try{
        let res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.3775&longitude=17.5883&current=temperature_2m,weather_code');
        let data=await res.json();

        document.getElementById('w-temp').innerText=Math.round(data.current.temperature_2m)+"°C";

        let c=data.current.weather_code;
        let i="☀️";
        if(c<=3)i="🌤️";
        else if(c<50)i="☁️";
        else if(c<70)i="🌧️";
        else i="❄️";

        document.getElementById('w-icon').innerText=i;

    }catch(e){
        document.getElementById('w-temp').innerText="ERR";
    }
}

/* 📅 AGENDA */
async function updateAgenda(){
    try{
        let res=await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        let txt=await res.text();
        let json=JSON.parse(txt.substring(47).slice(0,-2));

        let now=new Date();
        let html="";

        json.table.rows.forEach(r=>{
            if(!r.c)return;

            let val=r.c[1]?.f||r.c[1]?.v||"";

            let today=
                val.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) ||
                val.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

            if(!today)return;

            let C=r.c[2]?.v||"";
            let D=r.c[3]?.v||"";

           html+=`${D||C}`;
        });

        document.getElementById('agenda-box').innerHTML=html;

    }catch(e){
        document.getElementById('agenda-box').innerText="❌ chyba";
    }
}

/* 🚀 ŠTART */
updateClock();
updateWeather();
updateAgenda();

setInterval(updateClock,1000);
setInterval(updateWeather,600000);
setInterval(updateAgenda,60000);

</script>

</body>
</html>
