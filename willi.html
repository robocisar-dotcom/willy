<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Willy</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #bg { position: fixed; width: 100%; height: 100%; z-index: -1; filter: brightness(0.5); background-size: cover; background-position: center; transition: 2s; }
        #container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #clock { font-size: 10rem; font-weight: 100; margin: 0; }
        #date { font-size: 2.5rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="container">
        <div id="clock">00:00</div>
        <div id="date">Načítavam...</div>
    </div>

    <script>
        // TVOJE ID (OČISTENÉ)
        const sheetId = '1vTC382du3NGc6b_DugnxS1y3-p-Yt1iBJ63cmkTIEIp8';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('sk-SK', {weekday:'long', day:'numeric', month:'long'});
        }

        async function updateBG() {
            try {
                // Skúsime CSV formát - ten Google takmer nikdy neblokuje
                const r = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`);
                const data = await r.text();
                
                // Rozbijeme riadky a zoberieme stĺpec D (index 3)
                const rows = data.split('\n');
                const photoIds = rows.map(row => {
                    const cols = row.split(',');
                    return cols[3] ? cols[3].trim().replace(/"/g, '') : null;
                }).filter(id => id && id.length > 20);

                if (photoIds.length > 0) {
                    const id = photoIds[Math.floor(Math.random() * photoIds.length)];
                    const imgUrl = `https://drive.google.com/thumbnail?sz=w1920&id=${id}`;
                    
                    const bg = document.getElementById('bg');
                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = () => { bg.style.backgroundImage = `url('${imgUrl}')`; };
                }
            } catch (e) { console.error("Chyba:", e); }
        }

        setInterval(updateClock, 1000);
        setInterval(updateBG, 60000);
        updateClock();
        updateBG();
    </script>
</body>
</html>
